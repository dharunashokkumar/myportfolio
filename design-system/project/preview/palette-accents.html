<!doctype html><html><head><meta charset="utf-8"><title>Palette — Highlighter Accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px 24px;background:#fff;text-transform:none;text-align:left}
  .title{font-family:"Merriweather",serif;font-weight:900;font-size:13px;color:#333;margin:0 0 4px}
  .caption{font-family:"Merriweather",serif;font-weight:300;font-size:11px;color:#777;margin:0 0 14px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .tile{border:1px solid #eee;padding:14px 16px}
  .tile .swatch{height:28px;border:1px solid #ddd;margin-bottom:10px}
  .demo{font-family:"Merriweather",serif;font-weight:300;font-size:13px;color:#555;line-height:1.55}
  .hex{font-family:monospace;font-size:10px;color:#999;letter-spacing:.04em;margin-top:6px;display:block}
  .highlight{background:#fe9;padding:.1125rem}
  .featured{background:#fb0;color:#fff;padding:.1125rem .4rem;font-weight:900;display:inline-block}
</style></head>
<body>
<p class="caption">the two chromatic marks in the system. used as actual ink highlighter, not brand color.</p>
<div class="row">
  <div class="tile">
    <div class="swatch" style="background:#fe9"></div>
    <div class="demo">see my <span class="highlight">open source contributions</span> here.....</div>
    <span class="hex">#fe9 · span.highlight</span>
  </div>
  <div class="tile">
    <div class="swatch" style="background:#fb0"></div>
    <div class="demo"><span class="featured">featured</span> &nbsp; archive flag for pinned posts</div>
    <span class="hex">#fb0 · .featured_post</span>
  </div>
</div>
</body></html>
