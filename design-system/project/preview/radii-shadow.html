<!doctype html><html><head><meta charset="utf-8"><title>Radii & shadow</title>
<style>
  body{margin:0;padding:18px 24px;background:#fff;text-transform:none;text-align:left;font-family:"Merriweather",serif;color:#555}
  .sub{font-weight:300;color:#777;font-size:11px;margin:0 0 14px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
  .box{border:1px solid #ddd;height:64px;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:10px;color:#888;background:#f8f9fa}
  .lbl{font-family:monospace;font-size:10px;color:#999;margin-top:6px}
  .drop{box-shadow:0 2px 8px rgba(0,0,0,0.08);border:none;background:#e8e8e8;border-radius:0 0 10px 10px;height:60px}
</style></head>
<body>
<p class="sub">corners are square by default. three literal radii + one shadow exist in the source.</p>
<div class="grid">
  <div><div class="box" style="border-radius:0">0</div><div class="lbl">default</div></div>
  <div><div class="box" style="border-radius:8px">8px</div><div class="lbl">thumbnail img</div></div>
  <div><div class="box" style="border-radius:10px">10px</div><div class="lbl">thumblist tile</div></div>
  <div><div class="box drop">drawer</div><div class="lbl">drawer · 0 0 10 10 + shadow</div></div>
  <div><div class="box" style="border-radius:50%;width:64px">○</div><div class="lbl">lock badge 50%</div></div>
</div>
</body></html>
