<!doctype html><html><head><meta charset="utf-8"><title>Header + nav</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px 28px;background:#fff;text-align:center;font-family:"Merriweather",serif;color:#555}
  h1{font-size:.81rem;font-weight:900;margin:0 0 .4rem;text-transform:lowercase}
  h1 a{border:none;padding:0;color:#555}
  nav ul{list-style:none;padding:0;margin:0;display:flex;flex-wrap:wrap;gap:.45rem .9rem;justify-content:flex-start;max-width:36rem;margin:0 auto;text-transform:lowercase;font-style:italic;font-size:.81rem;text-align:left}
  nav li{display:block}
  nav a{color:inherit;padding:0 .1125rem;border-bottom:1px dotted #555;text-decoration:none}
  nav a#active_page{background:none;font-weight:900}
</style></head>
<body>
  <h1><a href="#">dharun ashokkumar</a></h1>
  <nav><ul>
    <li><a id="active_page">home</a></li>
    <li><a href="#">projects</a></li>
    <li><a href="#">reflections</a></li>
    <li><a href="#">resume</a></li>
    <li><a href="#">about</a></li>
    <li><a href="#">contact</a></li>
  </ul></nav>
</body></html>
