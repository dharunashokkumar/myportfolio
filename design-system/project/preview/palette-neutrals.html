<!doctype html><html><head><meta charset="utf-8"><title>Palette — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px 24px;background:#fff;text-transform:none;text-align:left}
  .row{display:grid;grid-template-columns:repeat(9,1fr);gap:8px}
  .sw{height:72px;border:1px solid #ddd;border-radius:0;position:relative;padding:6px 8px;box-sizing:border-box;font-family:"Merriweather",serif;font-size:10px;color:#555;line-height:1.2}
  .sw .hex{position:absolute;left:8px;bottom:6px;font-family:monospace;font-size:9.5px;color:#777;letter-spacing:.02em}
  .label{font-family:"Merriweather",serif;font-weight:900;font-size:11px;color:#333;margin-bottom:2px}
  .caption{font-family:"Merriweather",serif;font-weight:300;font-size:11px;color:#777;margin:0 0 10px}
</style></head>
<body>
<p class="caption">neutrals — the whole palette, light→dark. no chromatic brand hue.</p>
<div class="row">
  <div class="sw" style="background:#ffffff"><div class="label" style="color:#333">bg</div><span>page</span><span class="hex">#ffffff</span></div>
  <div class="sw" style="background:#f8f9fa"><div class="label" style="color:#333">bg-soft</div><span>infobox</span><span class="hex">#f8f9fa</span></div>
  <div class="sw" style="background:#eee"><div class="label" style="color:#333">bg-muted</div><span>panels</span><span class="hex">#eeeeee</span></div>
  <div class="sw" style="background:#e8e8e8"><div class="label" style="color:#333">bg-dim</div><span>drawer</span><span class="hex">#e8e8e8</span></div>
  <div class="sw" style="background:#ddd"><div class="label" style="color:#333">bg-shade</div><span>header row</span><span class="hex">#dddddd</span></div>
  <div class="sw" style="background:#ccc"><div class="label" style="color:#333">hover-bg</div><span>link hover</span><span class="hex">#cccccc</span></div>
  <div class="sw" style="background:#a2a9b1"><div class="label" style="color:#fff">line-strong</div><span style="color:#fff">wiki table</span><span class="hex" style="color:#fff">#a2a9b1</span></div>
  <div class="sw" style="background:#555"><div class="label" style="color:#fff">fg</div><span style="color:#ddd">body ink</span><span class="hex" style="color:#ddd">#555555</span></div>
  <div class="sw" style="background:#000"><div class="label" style="color:#fff">rule</div><span style="color:#bbb">hr + active</span><span class="hex" style="color:#bbb">#000000</span></div>
</div>
</body></html>
