<!doctype html><html><head><meta charset="utf-8"><title>Editorial fonts</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px 24px;background:#fff;text-transform:none;text-align:left}
  .sub{font-family:"Merriweather",serif;font-weight:300;color:#777;font-size:11px;margin:0 0 12px}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;border-top:1px solid #eee;padding-top:14px}
  .cell h3{font-family:inherit;margin:0 0 4px;font-size:34px;line-height:1}
  .cell .lbl{font-family:"Merriweather",serif;font-weight:300;font-size:10px;color:#999;letter-spacing:.06em;text-transform:uppercase}
  .instrument{font-family:'Instrument Serif',serif}
  .inter{font-family:'Inter',sans-serif;font-weight:500}
  .caveat{font-family:'Caveat',cursive;font-weight:600;color:#888}
</style></head>
<body>
<p class="sub">editorial stack — resume.html only. imports in addition to Merriweather.</p>
<div class="grid">
  <div class="cell"><h3 class="instrument"><i>Dharun</i> A.</h3><div class="lbl">Instrument Serif · hero</div></div>
  <div class="cell"><h3 class="inter" style="font-size:14px;letter-spacing:.12em;text-transform:uppercase">Experience</h3><div class="lbl">Inter 500 · ui labels</div></div>
  <div class="cell"><h3 class="caveat">written in '26</h3><div class="lbl">Caveat 600 · annotations</div></div>
</div>
</body></html>
