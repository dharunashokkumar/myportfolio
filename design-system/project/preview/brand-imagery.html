<!doctype html><html><head><meta charset="utf-8"><title>Hero imagery</title>
<style>
  body{margin:0;padding:16px 22px;background:#fff;text-align:left;font-family:"Merriweather",serif;color:#555}
  .sub{font-weight:300;color:#777;font-size:11px;margin:0 0 10px;text-transform:lowercase}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .tile{aspect-ratio:1;background:#f7f3ec;overflow:hidden}
  .tile img{width:100%;height:100%;object-fit:cover;display:block}
  .cap{font-size:10px;color:#999;margin-top:4px;font-family:monospace;text-transform:lowercase}
</style></head>
<body>
<p class="sub">still-life & watercolor imagery. warm, washed-out, single-subject. no grain overlays.</p>
<div class="grid">
  <div><div class="tile"><img src="../assets/main.webp"></div><div class="cap">main.webp · hero</div></div>
  <div><div class="tile"><img src="../assets/linecube.png"></div><div class="cap">linecube.png</div></div>
  <div><div class="tile"><img src="../assets/ribbon.png"></div><div class="cap">ribbon.png</div></div>
  <div><div class="tile"><img src="../assets/signal.png"></div><div class="cap">signal.png</div></div>
  <div><div class="tile"><img src="../assets/shadow.png"></div><div class="cap">shadow.png</div></div>
</div>
</body></html>
