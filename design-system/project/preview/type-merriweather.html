<!doctype html><html><head><meta charset="utf-8"><title>Typography — Merriweather specimen</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 28px;background:#fff;text-transform:none;text-align:left}
  .name{font-family:"Merriweather",serif;font-weight:900;font-size:32px;color:#111;letter-spacing:-.01em;margin:0 0 2px}
  .sub{font-family:"Merriweather",serif;font-weight:300;font-style:italic;color:#777;font-size:13px;margin:0 0 16px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;border-top:1px solid #eee;padding-top:12px}
  .cell{font-family:"Merriweather",serif;color:#333}
  .big{font-size:40px;line-height:1;letter-spacing:-.01em}
  .lbl{font-family:"Merriweather",serif;font-weight:300;font-size:10px;color:#999;margin-top:8px;text-transform:none}
</style></head>
<body>
<div class="name">Merriweather</div>
<p class="sub">body serif, the entire site. weights 300 + 900 (plus italics).</p>
<div class="grid">
  <div class="cell"><div class="big" style="font-weight:300">Aa</div><div class="lbl">300 · light · body</div></div>
  <div class="cell"><div class="big" style="font-weight:300;font-style:italic">Aa</div><div class="lbl">300i · emphasis</div></div>
  <div class="cell"><div class="big" style="font-weight:900">Aa</div><div class="lbl">900 · black · headings</div></div>
  <div class="cell"><div class="big" style="font-weight:900;font-style:italic">Aa</div><div class="lbl">900i · h3 / editorial</div></div>
</div>
</body></html>
