<!doctype html><html><head><meta charset="utf-8"><title>Links</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px 24px;background:#fff;text-align:left}
  .sub{font-family:"Merriweather",serif;font-weight:300;color:#777;font-size:11px;margin:0 0 12px;text-transform:none}
  .demo{font-family:"Merriweather",serif;font-weight:300;font-size:13px;color:#555;line-height:1.7}
  .demo a{color:inherit;padding:0 .1125rem;border-bottom:1px dotted #555;text-decoration:none}
  .demo a.ext{border-bottom-style:solid}
  .demo a.hover{background:#ccc;border-bottom-style:solid}
  .demo a.active{background:#ccc;color:#000;border-bottom-style:solid}
  .demo a.current{background:none;font-weight:900;border-bottom:none}
  .tag{font-family:monospace;font-size:10px;color:#999;margin-left:6px}
</style></head>
<body>
<p class="sub">four distinct link states, each declaratively different. no color change, all ink.</p>
<div class="demo">
  this is an <a href="#">internal link</a> <span class="tag">dotted · default</span><br>
  and an <a class="ext" href="#">external link</a> <span class="tag">solid · href *= //</span><br>
  on <a class="hover" href="#">hover</a> the bg fills #ccc <span class="tag">:hover</span><br>
  on <a class="active" href="#">press</a> the ink darkens to #000 <span class="tag">:active</span><br>
  when you're on the page: <a class="current" href="#">current</a> <span class="tag">#active_page</span>
</div>
</body></html>
