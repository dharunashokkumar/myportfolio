<!doctype html><html><head><meta charset="utf-8"><title>Rhythm & spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:16px 22px;background:#fff;text-transform:none;text-align:left;font-family:"Merriweather",serif;color:#555}
  .sub{font-weight:300;color:#777;font-size:11px;margin:0 0 10px}
  .scale{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;align-items:end}
  .bar{background:#eee;border-top:1px solid #ccc}
  .n{font-family:monospace;font-size:10px;color:#777;margin-top:6px}
  .v{font-family:monospace;font-size:9px;color:#aaa}
</style></head>
<body>
<p class="sub">vertical rhythm locked to 1.395rem line-height. every margin is a multiple of it.</p>
<div class="scale">
  <div><div class="bar" style="height:7px"></div><div class="n">1</div><div class="v">.45rem</div></div>
  <div><div class="bar" style="height:11px"></div><div class="n">2</div><div class="v">.6975rem</div></div>
  <div><div class="bar" style="height:16px"></div><div class="n">3</div><div class="v">1rem</div></div>
  <div><div class="bar" style="height:22px"></div><div class="n">4</div><div class="v">1.395rem</div></div>
  <div><div class="bar" style="height:29px"></div><div class="n">5</div><div class="v">1.8rem</div></div>
  <div><div class="bar" style="height:45px"></div><div class="n">6</div><div class="v">2.79rem</div></div>
  <div><div class="bar" style="height:58px"></div><div class="n">7</div><div class="v">3.6rem</div></div>
  <div><div class="bar" style="height:86px"></div><div class="n">8</div><div class="v">5.4rem</div></div>
</div>
</body></html>
