<!doctype html><html><head><meta charset="utf-8"><title>Brand wordmark</title>
<style>
  body{margin:0;padding:26px 28px;background:#fff;text-align:left;font-family:"Merriweather",serif;color:#555}
  .sub{font-weight:300;color:#777;font-size:11px;margin:0 0 14px;text-transform:lowercase}
  .mark{font-weight:900;font-size:26px;color:#333;letter-spacing:-.005em}
  .mark i{font-weight:300;font-style:italic;color:#888}
  .stack{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
  .badge{display:inline-flex;align-items:baseline;gap:.12rem;font-size:14px;font-weight:300}
  .badge img{width:1.05rem;height:1.05rem;opacity:.70;position:relative;top:.1em}
  .badge a{border-bottom:1px dotted #555;padding:0 .1125rem;color:#555;text-decoration:none}
</style></head>
<body>
<p class="sub">the wordmark is the logo. all-lowercase in running copy; cased in source + headings.</p>
<div class="stack">
  <div>
    <div class="mark">dharun ashokkumar</div>
    <p style="font-size:11px;color:#999;margin:.4rem 0 0">merriweather · 900 · 26px</p>
  </div>
  <div>
    <span class="badge"><img src="../assets/lpulogo.jpeg" alt=""><a href="#">lovely professional university</a></span>
    <p style="font-size:11px;color:#999;margin:.6rem 0 0">.lpu-inline-badge · inline logo + link</p>
  </div>
</div>
</body></html>
