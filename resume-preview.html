    <style>
      :root {
        --ink: #1a1a1a;
        --muted: #888;
        --accent: #555;
        --paper: #fafaf7;
        --rule: rgba(0,0,0,0.12);
        --serif: 'Instrument Serif', Georgia, serif;
        --sans: 'Inter', -apple-system, sans-serif;
        --hand: 'Caveat', cursive;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
        font-size: 16px;
        line-height: 1.5;
        text-transform: none;
        -webkit-font-smoothing: antialiased;
      }

      a { color: inherit; }

      .rp {
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem clamp(1rem, 3vw, 2.5rem) 3rem;
      }

      .rp-top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--rule);
        font-size: 0.78rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .rp-top a { text-decoration: none; transition: color 0.2s; }
      .rp-top a:hover { color: var(--ink); }

      .rp-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 2rem;
        flex-wrap: wrap;
        padding: 2.5rem 0 1.5rem;
      }

      .rp-heading {
        max-width: 36rem;
      }

      .rp-eyebrow {
        font-family: var(--hand);
        font-size: 1.4rem;
        color: var(--accent);
        display: inline-block;
        transform: rotate(-3deg);
        margin-bottom: 0.25rem;
      }

      .rp-title {
        font-family: var(--serif);
        font-size: clamp(2.4rem, 5vw, 4rem);
        line-height: 0.95;
        letter-spacing: -0.015em;
        margin: 0 0 0.75rem;
        font-weight: 400;
      }

      .rp-title i { color: var(--accent); }

      .rp-sub {
        font-size: 0.98rem;
        color: var(--accent);
        margin: 0;
        padding-left: 0.9rem;
        border-left: 2px solid var(--ink);
      }

      .rp-actions {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .rp-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        font-family: var(--sans);
        font-weight: 500;
        font-size: 0.92rem;
        letter-spacing: 0.02em;
        padding: 0.85rem 1.4rem;
        background: var(--ink);
        color: var(--paper);
        text-decoration: none;
        border: 1px solid var(--ink);
        transition: background 0.2s, color 0.2s, transform 0.2s;
      }

      .rp-btn:hover {
        background: var(--paper);
        color: var(--ink);
        transform: translateY(-2px);
      }

      .rp-btn .arrow {
        font-family: var(--serif);
        font-size: 1.15rem;
        line-height: 1;
      }

      .rp-ghost {
        font-size: 0.88rem;
        color: var(--muted);
        text-decoration: none;
        border-bottom: 1px solid var(--rule);
        padding-bottom: 2px;
      }

      .rp-ghost:hover { color: var(--ink); border-color: var(--ink); }

      /* Preview frame */
      .rp-frame {
        margin-top: 1rem;
        background: #fff;
        border: 1px solid var(--rule);
        box-shadow: 0 18px 60px rgba(0,0,0,0.08);
        position: relative;
        overflow: hidden;
      }

      .rp-frame-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.65rem 1rem;
        border-bottom: 1px solid var(--rule);
        background: #f3f2ee;
        font-size: 0.75rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .rp-dots { display: flex; gap: 0.35rem; }
      .rp-dots span {
        width: 10px; height: 10px; border-radius: 50%;
        background: #d8d6cf;
      }

      .rp-doc {
        width: 100%;
        height: min(85vh, 900px);
        border: 0;
        display: block;
        background: #eceae4;
      }

      .rp-fallback {
        display: none;
        padding: 3.5rem 1.5rem;
        text-align: center;
        font-family: var(--serif);
        font-size: 1.4rem;
        color: var(--muted);
        line-height: 1.4;
      }

      .rp-fallback small {
        display: block;
        margin-top: 0.75rem;
        font-family: var(--sans);
        font-size: 0.85rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .rp-foot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid var(--rule);
        font-size: 0.78rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .rp-foot a { text-decoration: none; }
      .rp-foot a:hover { color: var(--ink); }

      @media (max-width: 640px) {
        .rp-head { align-items: flex-start; }
        .rp-doc { height: 70vh; }
        .rp-foot { flex-direction: column; gap: 0.5rem; align-items: flex-start; }
      }
    </style>

      <header class="rp-top">
