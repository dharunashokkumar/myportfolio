<script>
(function() {
  const GITHUB_USER = 'dharunashokkumar';
  const CACHE_KEY = 'gh_opensource_cache';
  const CACHE_TTL = 10 * 60 * 1000; // 10 minutes

  const LANG_COLORS = {
    'JavaScript': '#f1e05a',
    'TypeScript': '#3178c6',
    'Python': '#3572A5',
    'Java': '#b07219',
    'C++': '#f34b7d',
    'C': '#555555',
    'C#': '#178600',
    'HTML': '#e34c26',
    'CSS': '#563d7c',
    'Shell': '#89e051',
    'Go': '#00ADD8',
    'Rust': '#dea584',
    'Ruby': '#701516',
    'PHP': '#4F5D95',
    'Swift': '#F05138',
    'Kotlin': '#A97BFF',
    'Dart': '#00B4AB',
    'Lua': '#000080',
    'Vue': '#41b883',
    'Dockerfile': '#384d54',
    'Makefile': '#427819',
    'Jupyter Notebook': '#DA5B0B',
    'HCL': '#844FBA',
    'SCSS': '#c6538c',
    'PowerShell': '#012456'
  };

  function relativeTime(dateStr) {
    const now = new Date();
    const then = new Date(dateStr);
    const diffMs = now - then;
    const diffSec = Math.floor(diffMs / 1000);
    const diffMin = Math.floor(diffSec / 60);
    const diffHr = Math.floor(diffMin / 60);
    const diffDay = Math.floor(diffHr / 24);
    const diffMonth = Math.floor(diffDay / 30);
    const diffYear = Math.floor(diffDay / 365);

    if (diffYear > 0) return diffYear === 1 ? '1 year ago' : diffYear + ' years ago';
    if (diffMonth > 0) return diffMonth === 1 ? '1 month ago' : diffMonth + ' months ago';
    if (diffDay > 0) return diffDay === 1 ? '1 day ago' : diffDay + ' days ago';
    if (diffHr > 0) return diffHr === 1 ? '1 hour ago' : diffHr + ' hours ago';
    if (diffMin > 0) return diffMin === 1 ? '1 minute ago' : diffMin + ' minutes ago';
    return 'just now';
  }

  function getCached() {
    try {
      var raw = sessionStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      var cached = JSON.parse(raw);
      if (Date.now() - cached.timestamp > CACHE_TTL) {
        sessionStorage.removeItem(CACHE_KEY);
        return null;
      }
      return cached.data;
    } catch (e) {
      return null;
    }
  }

  function setCache(data) {
    try {
      sessionStorage.setItem(CACHE_KEY, JSON.stringify({
        timestamp: Date.now(),
        data: data
      }));
    } catch (e) { /* ignore quota errors */ }
  }

  function renderStats(profile, repos) {
    var el = document.getElementById('github-stats');
    var ownedRepos = repos.length;
    var totalStars = repos.reduce(function(sum, r) { return sum + (r.stargazers_count || 0); }, 0);
    var totalForks = repos.reduce(function(sum, r) { return sum + (r.forks_count || 0); }, 0);

    el.innerHTML =
      '<div class="stat-card"><span class="stat-value">' + profile.public_repos + '</span><span class="stat-label">public repos</span></div>' +
      '<div class="stat-card"><span class="stat-value">' + totalStars + '</span><span class="stat-label">total stars</span></div>' +
      '<div class="stat-card"><span class="stat-value">' + profile.followers + '</span><span class="stat-label">followers</span></div>' +
      '<div class="stat-card"><span class="stat-value">' + profile.following + '</span><span class="stat-label">following</span></div>';

    var linkEl = document.getElementById('profile-link');
    linkEl.innerHTML = '<a href="' + profile.html_url + '" target="_blank" rel="noopener">view full profile on github &rarr;</a>';
  }

  function renderRepos(repos) {
    var el = document.getElementById('repo-list');
    if (repos.length === 0) {
      el.innerHTML = '<li class="repo-item" style="color:#999;text-align:center;">no repositories found.</li>';
      return;
    }

    var html = '';
    repos.forEach(function(repo) {
      var langColor = LANG_COLORS[repo.language] || '#ccc';
      var langHtml = repo.language
        ? '<span><span class="lang-dot" style="background:' + langColor + '"></span>' + repo.language + '</span>'
        : '';

      html += '<li class="repo-item">' +
        '<div class="repo-name"><a href="' + repo.html_url + '" target="_blank" rel="noopener">' + repo.name + '</a></div>' +
        (repo.description ? '<div class="repo-desc">' + escapeHtml(repo.description) + '</div>' : '') +
        '<div class="repo-meta">' +
          langHtml +
          (repo.stargazers_count > 0 ? '<span>&#9733; ' + repo.stargazers_count + '</span>' : '') +
          (repo.forks_count > 0 ? '<span>&#9724; ' + repo.forks_count + ' forks</span>' : '') +
          '<span class="repo-date">updated ' + relativeTime(repo.updated_at) + '</span>' +
        '</div>' +
        '</li>';
    });

    el.innerHTML = html;
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function showError(msg) {
    var statsEl = document.getElementById('github-stats');
    statsEl.innerHTML = '';
    var repoEl = document.getElementById('repo-list');
    repoEl.innerHTML = '<li class="error-msg">' + msg + '</li>';
  }

  function filterAndSortRepos(repos) {
    return repos
      .filter(function(r) {
        // keep owned repos; keep forks only if they have stars
        return !r.fork || r.stargazers_count > 0;
      })
      .sort(function(a, b) {
        return new Date(b.updated_at) - new Date(a.updated_at);
      });
  }

  function loadData() {
    var cached = getCached();
    if (cached) {
      renderStats(cached.profile, cached.repos);
      renderRepos(cached.repos);
      return;
    }

    var profileUrl = 'https://api.github.com/users/' + GITHUB_USER;
    var reposUrl = 'https://api.github.com/users/' + GITHUB_USER + '/repos?sort=updated&per_page=100';

    Promise.all([
      fetch(profileUrl).then(function(r) {
        if (!r.ok) throw new Error('github api error: ' + r.status);
        return r.json();
      }),
      fetch(reposUrl).then(function(r) {
        if (!r.ok) throw new Error('github api error: ' + r.status);
        return r.json();
      })
    ])
    .then(function(results) {
      var profile = results[0];
      var rawRepos = results[1];
      var repos = filterAndSortRepos(rawRepos);

      setCache({ profile: profile, repos: repos });
      renderStats(profile, repos);
      renderRepos(repos);
    })
    .catch(function(err) {
      showError('could not load github data. ' + err.message + '. <a href="https://github.com/' + GITHUB_USER + '" target="_blank" rel="noopener">visit github profile directly</a>.');
    });
  }

  loadData();
})();
</script>
