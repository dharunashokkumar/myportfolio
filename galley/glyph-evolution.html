<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
  <meta name="robots" content="noindex, nofollow">
<title>Glyph evolution — the letter A</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper:  #f3efe6;
    --paper-2:#ebe6d8;
    --ink:    #1a1814;
    --ink-2:  #3a3530;
    --mute:   #8a8377;
    --faint:  rgba(26, 24, 20, 0.14);
    --hair:   rgba(26, 24, 20, 0.22);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: var(--paper);
    color: var(--ink);
    font-family: "EB Garamond", Georgia, serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 56px 24px 80px;
    position: relative;
    overflow-x: hidden;
  }

  /* fine grain on paper */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(26,24,20,0.04), transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(26,24,20,0.03), transparent 55%);
    z-index: 0;
  }

  .kicker, .byline, .corner-l, .corner-r {
    position: fixed;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 10.5px;
    letter-spacing: 0.22em;
    color: var(--mute);
    text-transform: uppercase;
    z-index: 5;
  }
  .kicker  { top: 28px; left: 50%; transform: translateX(-50%); }
  .byline  { bottom: 28px; left: 50%; transform: translateX(-50%); }
  .corner-l { top: 28px; left: 32px; }
  .corner-r { top: 28px; right: 32px; }

  main {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    width: 100%;
    max-width: 760px;
  }

  /* ── Glyph stage ─────────────────────────────────────────── */
  .glyph-frame {
    position: relative;
    width: 520px;
    max-width: 92vw;
    aspect-ratio: 1.2 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .frame-marks {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .frame-marks .corner {
    position: absolute;
    width: 14px; height: 14px;
    border-color: var(--hair);
    border-style: solid;
    border-width: 0;
  }
  .frame-marks .corner.tl { top: 0;    left: 0;    border-top-width:1px; border-left-width:1px;  }
  .frame-marks .corner.tr { top: 0;    right: 0;   border-top-width:1px; border-right-width:1px; }
  .frame-marks .corner.bl { bottom: 0; left: 0;    border-bottom-width:1px; border-left-width:1px;  }
  .frame-marks .corner.br { bottom: 0; right: 0;   border-bottom-width:1px; border-right-width:1px; }

  .baseline, .meanline {
    position: absolute;
    left: 14%; right: 14%;
    border-top: 1px dashed var(--faint);
    pointer-events: none;
  }
  .meanline { top: 50%; }
  .baseline { top: calc(50% + 22%); }
  .capline  { top: calc(50% - 28%); }
  .baseline, .meanline, .capline {
    position: absolute;
    left: 14%; right: 14%;
    border-top: 1px dashed var(--faint);
    pointer-events: none;
  }

  .axis-label {
    position: absolute;
    right: 8%;
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--mute);
    text-transform: uppercase;
    opacity: 0.7;
    transform: translateY(-50%);
  }
  .axis-label.cap   { top: calc(50% - 28%); }
  .axis-label.mean  { top: 50%; }
  .axis-label.base  { top: calc(50% + 22%); }

  svg.glyph {
    width: 76%;
    height: 76%;
    overflow: visible;
    z-index: 1;
  }
  svg.glyph path {
    fill: none;
    stroke: var(--ink);
    stroke-width: 7.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    vector-effect: non-scaling-stroke;
  }
  svg.glyph .ghost {
    stroke: var(--ink);
    opacity: 0.07;
    stroke-width: 7.5;
  }

  /* ── Caption ─────────────────────────────────────────────── */
  .caption {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: baseline;
    gap: 28px;
    width: 100%;
    max-width: 620px;
    padding: 0 8px;
  }
  .cap-left, .cap-right {
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    letter-spacing: 0.18em;
    color: var(--mute);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .cap-left  { text-align: right; }
  .cap-right { text-align: left;  }
  .cap-name {
    font-family: "EB Garamond", serif;
    font-style: italic;
    font-weight: 500;
    font-size: 28px;
    color: var(--ink);
    text-align: center;
    letter-spacing: 0.005em;
    line-height: 1;
  }

  /* ── Scrubber ───────────────────────────────────────────── */
  .scrubber-wrap {
    width: 600px;
    max-width: 92vw;
    margin-top: 20px;
    user-select: none;
  }

  .scrubber {
    position: relative;
    height: 68px;
    padding: 0 14px;
    touch-action: none;
    cursor: pointer;
  }

  .scrubber-track,
  .scrubber-progress {
    position: absolute;
    top: 32px;
    left: 14px;
    height: 1px;
  }
  .scrubber-track    { right: 14px; background: var(--hair); }
  .scrubber-progress { width: 0;    background: var(--ink); }

  .scrubber-tick {
    position: absolute;
    top: 27px;
    width: 1px;
    height: 11px;
    background: var(--ink);
    opacity: 0.55;
    transform: translateX(-50%);
    pointer-events: none;
  }

  .scrubber-date,
  .scrubber-label {
    position: absolute;
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--mute);
    text-transform: uppercase;
    transform: translateX(-50%);
    white-space: nowrap;
    pointer-events: none;
  }
  .scrubber-date  { top: 8px; }
  .scrubber-label {
    top: 48px;
    font-family: "EB Garamond", serif;
    font-style: italic;
    font-size: 11.5px;
    letter-spacing: 0.02em;
    text-transform: none;
    color: var(--mute);
  }
  .scrubber-label.active { color: var(--ink); }

  .scrubber-handle {
    position: absolute;
    top: 25px;
    width: 15px; height: 15px;
    border-radius: 50%;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    transform: translateX(-50%);
    cursor: grab;
    box-shadow: 0 0 0 4px var(--paper);
    transition: transform 0.15s ease, width 0.15s ease, height 0.15s ease;
  }
  .scrubber-handle::after {
    content: "";
    position: absolute;
    inset: 3px;
    background: var(--ink);
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .scrubber-handle:hover::after,
  .scrubber-handle.dragging::after { opacity: 1; }
  .scrubber-handle.dragging { cursor: grabbing; }

  /* ── Controls row ───────────────────────────────────────── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--mute);
    text-transform: uppercase;
  }
  .controls button {
    background: none;
    border: 1px solid var(--hair);
    color: var(--ink-2);
    font: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    padding: 7px 16px 6px;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  .controls button:hover {
    background: rgba(26,24,20,0.05);
    border-color: var(--ink-2);
  }
  .controls .play-glyph {
    width: 0; height: 0;
    border-left: 6px solid var(--ink);
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    transition: all 0.2s;
  }
  .controls button.playing .play-glyph {
    width: 6px;
    height: 8px;
    border: 0;
    background:
      linear-gradient(var(--ink), var(--ink)) left/2px 100% no-repeat,
      linear-gradient(var(--ink), var(--ink)) right/2px 100% no-repeat;
  }

  .hint {
    color: var(--mute);
    opacity: 0.65;
  }

  /* responsive trim */
  @media (max-width: 560px) {
    .corner-l, .corner-r { display: none; }
    .caption { grid-template-columns: 1fr; }
    .cap-left, .cap-right { text-align: center; }
    .scrubber-label { font-size: 10px; }
    .scrubber-date  { font-size: 8.5px; }
  }
</style>
</head>
<body>

<div class="kicker">Glyph Evolution · the letter A</div>
<div class="corner-l">№ 01</div>
<div class="corner-r">three millennia · one letter</div>

<main>

  <div class="glyph-frame" aria-hidden="true">
    <div class="frame-marks">
      <span class="corner tl"></span><span class="corner tr"></span>
      <span class="corner bl"></span><span class="corner br"></span>
    </div>
    <div class="capline"></div>
    <div class="meanline"></div>
    <div class="baseline"></div>
    <div class="axis-label cap">cap</div>
    <div class="axis-label mean">mean</div>
    <div class="axis-label base">base</div>

    <svg class="glyph" viewBox="-100 -100 200 200" preserveAspectRatio="xMidYMid meet">
      <path id="glyph-ghost" class="ghost" d=""></path>
      <path id="glyph-path" d=""></path>
    </svg>
  </div>

  <div class="caption">
    <div class="cap-left"  id="cap-year">c. 1050 BCE</div>
    <div class="cap-name"  id="cap-name">aleph</div>
    <div class="cap-right" id="cap-region">Levantine coast</div>
  </div>

  <div class="scrubber-wrap">
    <div class="scrubber" id="scrubber">
      <div class="scrubber-track"></div>
      <div class="scrubber-progress" id="progress"></div>
      <!-- ticks, dates, labels injected -->
      <div class="scrubber-handle" id="handle" tabindex="0" role="slider"
           aria-label="Time scrubber" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
    </div>

    <div class="controls">
      <button id="play-btn" type="button">
        <span class="play-glyph"></span>
        <span id="play-label">play</span>
      </button>
      <span class="hint">drag · or arrow keys</span>
    </div>
  </div>

</main>

<script>
/* ──────────────────────────────────────────────────────────────
   GLYPH DATA — five anchors in the life of the letter A.
   Each glyph is 3 strokes, each stroke a polyline of keypoints.
   We resample every stroke to N points, then linearly interpolate
   point-by-point between adjacent glyphs as the scrubber moves.
   ────────────────────────────────────────────────────────────── */

const GLYPHS = [
  {
    name:   "aleph",
    period: "Phoenician script",
    region: "Levantine coast",
    year:   -1050,
    yearLabel: "c. 1050 BCE",
    short:  "Phoenician",
    /* The ox-head: rotated ~90°, point on the right, two horns
       reaching back-left, a short bar for the muzzle. */
    strokes: [
      // upper horn  (back-upper-left → tip-right)
      [[-78,-62], [-52,-50], [-22,-34], [10,-20], [42,-10], [78, 0]],
      // lower horn  (back-lower-left → tip-right)
      [[-78, 62], [-52, 50], [-22, 34], [10, 20], [42, 10], [78, 0]],
      // crossbar / muzzle (vertical on the left)
      [[-55,-30], [-55,-15], [-55,  0], [-55, 15], [-55, 30], [-55, 30]],
    ],
  },

  {
    name:   "alpha",
    period: "Archaic Greek alpha",
    region: "Aegean",
    year:   -750,
    yearLabel: "c. 750 BCE",
    short:  "Greek",
    /* The Greeks rotated it upright. Early forms were a little
       lopsided — apex left of center, legs splaying outward. */
    strokes: [
      // left leg  (apex → bottom-left)
      [[-10,-85], [-18,-55], [-28,-25], [-40,  5], [-54, 40], [-66, 80]],
      // right leg (apex → bottom-right)
      [[-10,-85], [  2,-55], [ 16,-25], [ 30,  5], [ 46, 40], [ 62, 80]],
      // crossbar, slightly slanted
      [[-42,  6], [-28, 11], [-14, 14], [  2, 17], [ 16, 19], [ 26, 21]],
    ],
  },

  {
    name:   "A",
    period: "Roman capitalis monumentalis",
    region: "Imperial Rome",
    year:    100,
    yearLabel: "c. 100 CE",
    short:  "Roman",
    /* The classical capital — apex centred, symmetric, mid-set bar. */
    strokes: [
      [[  0,-85], [-13,-55], [-26,-25], [-40,  5], [-56, 38], [-72, 80]],
      [[  0,-85], [ 13,-55], [ 26,-25], [ 40,  5], [ 56, 38], [ 72, 80]],
      [[-36, 14], [-22, 14], [ -8, 14], [  8, 14], [ 22, 14], [ 36, 14]],
    ],
  },

  {
    name:   "a",
    period: "Carolingian minuscule",
    region: "Frankish empire",
    year:    850,
    yearLabel: "c. 850 CE",
    short:  "Carolingian",
    /* The bowl is born. Single-storey lowercase 'a' — round belly
       on the left, soft stem on the right. */
    strokes: [
      // upper bowl arc: stem-top → over the top → left side
      [[ 24,-26], [  6,-38], [-14,-37], [-30,-26], [-40, -8], [-42,  8]],
      // lower bowl arc: left side → under → right meeting stem
      [[-42,  8], [-34, 28], [-14, 40], [  8, 40], [ 24, 30], [ 30, 14]],
      // right stem (where the crossbar used to be)
      [[ 32,-28], [ 31, -8], [ 31, 10], [ 32, 26], [ 35, 42], [ 38, 52]],
    ],
  },

  {
    name:   "a",
    period: "Modern sans-serif",
    region: "Digital",
    year:    2026,
    yearLabel: "2026 CE",
    short:  "Modern",
    /* Cleaned, rounder bowl, stem dropped straight. */
    strokes: [
      [[ 28,-32], [  6,-42], [-16,-40], [-32,-30], [-42,-12], [-44,  6]],
      [[-44,  6], [-38, 28], [-20, 42], [  4, 44], [ 22, 38], [ 32, 22]],
      [[ 34,-30], [ 34, -8], [ 34, 12], [ 34, 30], [ 36, 46], [ 40, 56]],
    ],
  },
];

/* ── Resample each stroke to N evenly-spaced points by arclength ── */
const N = 28;

function resample(pts, n) {
  if (pts.length < 2) return Array.from({length:n}, () => [pts[0]?.[0]||0, pts[0]?.[1]||0]);
  const cum = [0];
  for (let i = 1; i < pts.length; i++) {
    cum.push(cum[i-1] + Math.hypot(pts[i][0]-pts[i-1][0], pts[i][1]-pts[i-1][1]));
  }
  const total = cum[cum.length-1];
  if (total === 0) return Array.from({length:n}, () => [pts[0][0], pts[0][1]]);
  const out = [];
  for (let i = 0; i < n; i++) {
    const target = (i / (n-1)) * total;
    let seg = 0;
    while (seg < cum.length-2 && cum[seg+1] < target) seg++;
    const segLen = cum[seg+1] - cum[seg];
    const t = segLen === 0 ? 0 : (target - cum[seg]) / segLen;
    out.push([
      pts[seg][0] + (pts[seg+1][0]-pts[seg][0])*t,
      pts[seg][1] + (pts[seg+1][1]-pts[seg][1])*t,
    ]);
  }
  return out;
}

const SAMPLED = GLYPHS.map(g => ({...g, sampled: g.strokes.map(s => resample(s, N))}));

/* ── Render a set of strokes as a smoothed (Catmull-Rom→Bezier) path ── */
function strokesToPath(strokes) {
  let d = "";
  for (const pts of strokes) {
    if (pts.length < 2) continue;
    d += ` M ${pts[0][0].toFixed(2)} ${pts[0][1].toFixed(2)}`;
    for (let i = 0; i < pts.length-1; i++) {
      const p0 = pts[i-1] || pts[i];
      const p1 = pts[i];
      const p2 = pts[i+1];
      const p3 = pts[i+2] || pts[i+1];
      const c1x = p1[0] + (p2[0]-p0[0])/6;
      const c1y = p1[1] + (p2[1]-p0[1])/6;
      const c2x = p2[0] - (p3[0]-p1[0])/6;
      const c2y = p2[1] - (p3[1]-p1[1])/6;
      d += ` C ${c1x.toFixed(2)} ${c1y.toFixed(2)}, ${c2x.toFixed(2)} ${c2y.toFixed(2)}, ${p2[0].toFixed(2)} ${p2[1].toFixed(2)}`;
    }
  }
  return d.trim();
}

/* ── Interpolate strokes between two sampled glyphs ── */
function lerpStrokes(a, b, t) {
  const e = t < 0.5
    ? 4*t*t*t
    : 1 - Math.pow(-2*t+2, 3)/2; // ease in-out cubic
  return a.map((stroke, i) => stroke.map((p, j) => [
    p[0] + (b[i][j][0]-p[0])*e,
    p[1] + (b[i][j][1]-p[1])*e,
  ]));
}

/* ── DOM refs ───────────────────────────────────────────────── */
const pathEl    = document.getElementById("glyph-path");
const ghostEl   = document.getElementById("glyph-ghost");
const nameEl    = document.getElementById("cap-name");
const yearEl    = document.getElementById("cap-year");
const regionEl  = document.getElementById("cap-region");
const scrubber  = document.getElementById("scrubber");
const progress  = document.getElementById("progress");
const handle    = document.getElementById("handle");
const playBtn   = document.getElementById("play-btn");
const playLabel = document.getElementById("play-label");

let currentT = 0;
let dragging = false;
let playing  = false;

/* ── Inject ticks, date and period labels along the scrubber ── */
const tickEls = [];
const labelEls = [];
SAMPLED.forEach((g, i) => {
  const tt = i / (SAMPLED.length - 1);
  const leftCalc = `calc(14px + ${tt} * (100% - 28px))`;

  const tk = document.createElement("div");
  tk.className = "scrubber-tick";
  tk.style.left = leftCalc;
  scrubber.appendChild(tk);
  tickEls.push(tk);

  const dt = document.createElement("div");
  dt.className = "scrubber-date";
  dt.textContent = g.yearLabel.replace("c. ", "");
  dt.style.left = leftCalc;
  scrubber.appendChild(dt);

  const lb = document.createElement("div");
  lb.className = "scrubber-label";
  lb.textContent = g.short;
  lb.style.left = leftCalc;
  scrubber.appendChild(lb);
  labelEls.push(lb);
});

/* ── Year formatter for interpolated years ── */
function formatYear(y) {
  const r = Math.round(y / 10) * 10;
  if (r < 0)  return `c. ${Math.abs(r)} BCE`;
  if (r === 0) return "0";
  return `c. ${r} CE`;
}

/* ── Master render ── */
function render(t) {
  currentT = Math.max(0, Math.min(1, t));
  const segs   = SAMPLED.length - 1;
  const scaled = currentT * segs;
  const idx    = Math.min(Math.floor(scaled), segs - 1);
  const local  = scaled - idx;

  const morphed = lerpStrokes(SAMPLED[idx].sampled, SAMPLED[idx+1].sampled, local);
  const d = strokesToPath(morphed);
  pathEl.setAttribute("d", d);

  // ghost = the previous anchor as a faint trace
  const ghostIdx = Math.max(0, Math.min(SAMPLED.length-1, Math.round(scaled)));
  ghostEl.setAttribute("d", strokesToPath(SAMPLED[ghostIdx].sampled));

  // caption — nearest anchor, but year is the live interpolation
  const ya = SAMPLED[idx].year;
  const yb = SAMPLED[idx+1].year;
  const liveYear = ya + (yb - ya) * local;
  yearEl.textContent  = formatYear(liveYear);

  const nearest = SAMPLED[Math.round(scaled)];
  nameEl.textContent   = nearest.name;
  regionEl.textContent = nearest.region;

  // scrubber UI
  const rect = scrubber.getBoundingClientRect();
  const trackW = rect.width - 28;
  const x = 14 + currentT * trackW;
  handle.style.left   = `${x}px`;
  progress.style.width = `${currentT * trackW}px`;
  handle.setAttribute("aria-valuenow", Math.round(currentT * 100));

  // active label
  const activeIdx = Math.round(scaled);
  labelEls.forEach((el, i) => el.classList.toggle("active", i === activeIdx));
}

/* ── Pointer interaction ── */
function pointerToT(e) {
  const rect = scrubber.getBoundingClientRect();
  const cx = e.clientX !== undefined ? e.clientX : (e.touches?.[0]?.clientX || 0);
  const x = cx - rect.left;
  return (x - 14) / (rect.width - 28);
}

scrubber.addEventListener("pointerdown", (e) => {
  dragging = true;
  handle.classList.add("dragging");
  scrubber.setPointerCapture(e.pointerId);
  stopPlaying();
  render(pointerToT(e));
});
scrubber.addEventListener("pointermove", (e) => {
  if (!dragging) return;
  render(pointerToT(e));
});
scrubber.addEventListener("pointerup", (e) => {
  if (!dragging) return;
  dragging = false;
  handle.classList.remove("dragging");
  try { scrubber.releasePointerCapture(e.pointerId); } catch(_) {}
});
scrubber.addEventListener("pointercancel", () => {
  dragging = false;
  handle.classList.remove("dragging");
});

/* keyboard */
handle.addEventListener("keydown", (e) => {
  const step = e.shiftKey ? 0.25 : 0.02;
  if (e.key === "ArrowRight" || e.key === "ArrowUp")   { stopPlaying(); render(currentT + step); e.preventDefault(); }
  if (e.key === "ArrowLeft"  || e.key === "ArrowDown") { stopPlaying(); render(currentT - step); e.preventDefault(); }
  if (e.key === "Home")  { stopPlaying(); render(0); e.preventDefault(); }
  if (e.key === "End")   { stopPlaying(); render(1); e.preventDefault(); }
});

/* ── Play / pause ── */
let rafId = 0;
let playStart = 0;
const DURATION = 7000; // ms for a full sweep

function startPlaying() {
  if (playing) return;
  playing = true;
  playBtn.classList.add("playing");
  playLabel.textContent = "pause";
  const startT = currentT >= 0.999 ? 0 : currentT;
  playStart = performance.now() - startT * DURATION;
  const step = (now) => {
    if (!playing) return;
    const t = Math.min((now - playStart) / DURATION, 1);
    render(t);
    if (t < 1) rafId = requestAnimationFrame(step);
    else {
      playing = false;
      playBtn.classList.remove("playing");
      playLabel.textContent = "replay";
    }
  };
  rafId = requestAnimationFrame(step);
}
function stopPlaying() {
  if (!playing) return;
  playing = false;
  cancelAnimationFrame(rafId);
  playBtn.classList.remove("playing");
  playLabel.textContent = "play";
}
playBtn.addEventListener("click", () => playing ? stopPlaying() : startPlaying());

/* ── Init ── */
render(0);
window.addEventListener("resize", () => render(currentT));

// Gentle auto-play once on first paint
window.addEventListener("load", () => {
  setTimeout(() => { if (!dragging && currentT === 0) startPlaying(); }, 600);
});
</script>

<div class="byline">drag the dot · or press play</div>

</body>
</html>
