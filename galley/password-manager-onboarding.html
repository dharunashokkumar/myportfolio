<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Vault — setup</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f0d;
    --bg-2: #0e1311;
    --panel: #11171450;
    --panel-solid: #11171a;
    --border: #1c2622;
    --border-strong: #28332e;
    --fg: #e3ebe6;
    --fg-2: #b6c1bc;
    --muted: #6c7a73;
    --muted-2: #4d5853;

    --accent: oklch(0.82 0.18 145);
    --accent-deep: oklch(0.62 0.18 145);
    --accent-soft: oklch(0.82 0.18 145 / 0.14);
    --accent-glow: oklch(0.82 0.18 145 / 0.35);

    --bad:  oklch(0.70 0.18 25);
    --warn: oklch(0.78 0.15 75);

    --radius: 12px;
    --radius-sm: 8px;

    --sans: "DM Sans", system-ui, -apple-system, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-feature-settings: "ss01" on, "cv11" on;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(ellipse 80% 60% at 10% -10%, oklch(0.82 0.18 145 / 0.06), transparent 60%),
      radial-gradient(ellipse 60% 50% at 110% 10%, oklch(0.82 0.18 145 / 0.04), transparent 60%);
  }

  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 40px 80px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
    gap: 32px;
  }

  /* ---------- Top: brand + progress ---------- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--fg-2);
  }
  .brand-mark {
    width: 22px; height: 22px;
    border-radius: 6px;
    background:
      linear-gradient(135deg, var(--accent), var(--accent-deep));
    display: grid;
    place-items: center;
    color: #07120c;
  }
  .brand-mark::after {
    content: "";
    width: 7px; height: 7px;
    border-radius: 1.5px;
    background: #07120c;
    box-shadow: 0 0 0 2px var(--accent);
    transform: translate(0,-1px);
  }
  .brand .dim { color: var(--muted); }

  .progress {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .progress .node {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-transform: uppercase;
    cursor: pointer;
    padding: 6px 4px;
    background: none; border: 0;
  }
  .progress .node .dot {
    width: 9px; height: 9px; border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    background: var(--bg-2);
    transition: all 200ms;
  }
  .progress .node.active { color: var(--fg); }
  .progress .node.active .dot {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft), 0 0 14px var(--accent-glow);
  }
  .progress .node.done .dot {
    background: var(--accent-deep);
    border-color: var(--accent-deep);
  }
  .progress .node.done { color: var(--fg-2); }
  .progress .line {
    width: 38px; height: 1px;
    background: var(--border-strong);
    margin: 0 4px;
  }
  .progress .line.done { background: var(--accent-deep); }

  /* ---------- Card ---------- */
  .card {
    background: linear-gradient(180deg, #10161345, #0d131045);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 44px 48px 40px;
    box-shadow:
      0 1px 0 oklch(0.99 0 0 / 0.02) inset,
      0 30px 80px -40px #000;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 40% at 50% -20%, var(--accent-soft), transparent 60%);
    pointer-events: none;
  }

  .step { position: relative; }
  .step-eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .step-eyebrow .kbd {
    display: inline-block;
    padding: 3px 7px;
    border: 1px solid var(--border-strong);
    border-radius: 5px;
    color: var(--accent);
    background: var(--accent-soft);
    font-weight: 500;
  }
  .step-title {
    font-size: 32px;
    line-height: 1.15;
    letter-spacing: -0.02em;
    font-weight: 500;
    margin: 0 0 10px;
    color: var(--fg);
  }
  .step-title.big { font-size: 40px; }
  .step-sub {
    font-size: 15px;
    line-height: 1.55;
    color: var(--fg-2);
    margin: 0 0 28px;
    max-width: 60ch;
    text-wrap: pretty;
  }
  .step-sub.tight { margin-bottom: 18px; }

  /* ---------- Segmented ---------- */
  .seg {
    display: inline-flex;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 18px;
  }
  .seg button {
    border: 0; background: transparent;
    color: var(--fg-2);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 7px;
    cursor: pointer;
    transition: all 160ms;
  }
  .seg button.on {
    background: var(--border);
    color: var(--fg);
  }
  .seg button:hover:not(.on) { color: var(--fg); }

  /* ---------- Key field ---------- */
  .key-field { margin-bottom: 16px; }
  .key-display {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 18px 18px 18px 20px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background:
      linear-gradient(180deg, #0d130f, #0a0f0c);
    position: relative;
  }
  .key-display::before {
    content: "";
    position: absolute; left: 0; top: 12px; bottom: 12px;
    width: 2px; background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .key-display code {
    font-family: var(--mono);
    font-size: 18px;
    letter-spacing: 0.01em;
    color: var(--fg);
    word-break: break-all;
    flex: 1;
  }
  .key-display code.masked { letter-spacing: 0.08em; color: var(--fg-2); }
  .key-actions { display: flex; gap: 4px; }
  .ghost {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: transparent;
    color: var(--fg-2);
    border: 1px solid transparent;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: var(--sans);
    font-size: 13px;
    transition: all 140ms;
  }
  .ghost:hover { background: var(--border); color: var(--fg); }
  .ghost.small { font-size: 12px; padding: 6px 9px; }

  .key-input {
    width: 100%;
    padding: 18px 20px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: #0a0f0c;
    color: var(--fg);
    font-family: var(--mono);
    font-size: 18px;
    outline: none;
    transition: border-color 160ms, box-shadow 160ms;
  }
  .key-input:focus { border-color: var(--accent-deep); box-shadow: 0 0 0 3px var(--accent-soft); }

  /* ---------- Strength meter ---------- */
  .strength { margin-bottom: 24px; }
  .strength-bar {
    height: 6px;
    background: var(--bg-2);
    border-radius: 3px;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .strength-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 260ms cubic-bezier(.2,.7,.2,1), background 200ms;
  }
  .strength-fill.tone-bad  { background: linear-gradient(90deg, var(--bad), oklch(0.65 0.15 25)); }
  .strength-fill.tone-warn { background: linear-gradient(90deg, oklch(0.65 0.15 25), var(--warn)); }
  .strength-fill.tone-ok   { background: linear-gradient(90deg, var(--warn), oklch(0.78 0.18 110)); }
  .strength-fill.tone-good { background: linear-gradient(90deg, oklch(0.78 0.18 110), var(--accent)); }
  .strength-ticks { position: absolute; inset: 0; pointer-events: none; }
  .strength-ticks .tick {
    position: absolute; top: 0; bottom: 0; width: 1px;
    background: var(--bg);
    opacity: 0.7;
  }
  .strength-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    font-size: 12.5px;
  }
  .strength-meta > div { display: flex; align-items: center; gap: 10px; }
  .pill {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid currentColor;
  }
  .pill.tone-bad  { color: var(--bad); }
  .pill.tone-warn { color: var(--warn); }
  .pill.tone-ok   { color: oklch(0.78 0.18 110); }
  .pill.tone-good { color: var(--accent); }

  .muted { color: var(--muted); }
  .muted.small { font-size: 12px; }
  .mono { font-family: var(--mono); }

  /* Note disclosure */
  .note {
    margin-top: 4px;
    border-top: 1px dashed var(--border);
    padding-top: 16px;
    font-size: 13px;
    color: var(--fg-2);
  }
  .note summary {
    cursor: pointer;
    color: var(--muted);
    list-style: none;
    display: flex; align-items: center; gap: 8px;
  }
  .note summary::before {
    content: "+";
    font-family: var(--mono);
    color: var(--accent);
  }
  .note[open] summary::before { content: "−"; }
  .note p {
    margin: 12px 0 0;
    line-height: 1.6;
    max-width: 70ch;
  }

  /* ---------- Step 2: providers ---------- */
  .provider-list {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 22px;
  }
  .provider {
    display: grid;
    grid-template-columns: 36px 1fr 18px;
    gap: 14px;
    align-items: flex-start;
    padding: 18px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    text-align: left;
    color: var(--fg);
    font-family: var(--sans);
    transition: all 160ms;
  }
  .provider:hover { border-color: var(--border-strong); }
  .provider.selected {
    border-color: var(--accent-deep);
    background:
      linear-gradient(180deg, oklch(0.82 0.18 145 / 0.06), transparent),
      var(--bg-2);
    box-shadow: 0 0 0 1px var(--accent-deep) inset;
  }
  .provider-icon {
    width: 36px; height: 36px;
    border-radius: 9px;
    background: var(--border);
    display: grid; place-items: center;
    color: var(--fg-2);
  }
  .provider.selected .provider-icon { color: var(--accent); background: var(--accent-soft); }
  .provider-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .provider-sub { font-size: 12.5px; color: var(--muted); line-height: 1.45; text-wrap: pretty; }
  .provider-check {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    display: grid; place-items: center;
    color: var(--bg);
  }
  .provider.selected .provider-check {
    background: var(--accent);
    border-color: var(--accent);
  }

  /* ---------- Forms ---------- */
  .provider-form {
    padding: 20px;
    background: #0a0e0c;
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .form-grid { display: grid; gap: 14px; }
  .form-grid.two-col { grid-template-columns: 1fr 1fr; }
  .form-grid .col-span-2 { grid-column: span 2; }
  .form-grid label {
    display: flex; flex-direction: column; gap: 6px;
  }
  .form-grid label > span {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: var(--mono);
  }
  .form-grid input {
    padding: 11px 13px;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    color: var(--fg);
    font-family: var(--sans);
    font-size: 13.5px;
    outline: none;
    transition: border-color 140ms, box-shadow 140ms;
  }
  .form-grid input.mono { font-family: var(--mono); font-size: 12.5px; }
  .form-grid input:focus {
    border-color: var(--accent-deep);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .path-input {
    display: flex; gap: 8px;
  }
  .path-input input { flex: 1; font-family: var(--mono); font-size: 12.5px; }
  .path-input button {
    padding: 8px 14px;
    background: var(--border);
    border: 0;
    color: var(--fg);
    border-radius: 8px;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 13px;
  }
  .form-hint {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px;
    color: var(--muted);
  }

  /* ---------- Step 3: 2FA ---------- */
  .twofa-grid {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 32px;
    align-items: flex-start;
    margin-bottom: 30px;
  }
  .qr-card {
    background: #f4f7f5;
    border-radius: var(--radius);
    padding: 16px;
    width: 240px;
    height: 240px;
    display: grid;
    place-items: center;
    position: relative;
    box-shadow:
      0 0 0 1px var(--border-strong),
      0 0 0 5px #0d1311,
      0 0 0 6px var(--border);
  }
  .qr-card::after {
    content: "scan";
    position: absolute;
    bottom: -22px; left: 50%;
    transform: translateX(-50%);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .twofa-meta { padding-top: 4px; }
  .field-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .secret-box {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }
  .secret-box code {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 0.04em;
  }

  .otp-row { display: flex; gap: 8px; }
  .otp {
    width: 44px; height: 52px;
    text-align: center;
    background: var(--bg-2);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    color: var(--fg);
    font-family: var(--mono);
    font-size: 20px;
    outline: none;
    transition: all 140ms;
  }
  .otp:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .backup {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .backup-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 14px;
  }
  .backup-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .backup-code {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 9px 11px;
    background: #0a0e0c;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .backup-code .muted { font-size: 10px; }
  .backup-code code {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--fg);
  }

  /* ---------- Step 4: success ---------- */
  .step.done { text-align: center; padding-top: 8px; }
  .step.done .step-title,
  .step.done .step-sub { text-align: center; margin-left: auto; margin-right: auto; }
  .success-mark {
    width: 84px; height: 84px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent);
    display: grid; place-items: center;
    margin: 0 auto 22px;
    box-shadow: 0 0 0 8px oklch(0.82 0.18 145 / 0.06), 0 0 60px var(--accent-glow);
    animation: pop 600ms cubic-bezier(.2,1.4,.4,1);
  }
  @keyframes pop {
    0% { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .summary {
    text-align: left;
    max-width: 460px;
    margin: 28px auto 28px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .summary-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0;
    border-bottom: 1px dashed var(--border);
    font-size: 13.5px;
  }
  .summary-row:last-child { border-bottom: 0; }
  .summary-row .muted { display: inline-flex; align-items: center; gap: 8px; }

  .next-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 8px;
  }
  .finetext {
    margin-top: 24px;
  }
  .link {
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: var(--accent-deep);
  }

  /* ---------- Footer / CTA bar ---------- */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .footer-left {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted-2);
    letter-spacing: 0.06em;
  }
  .cta-row { display: flex; gap: 10px; }
  .cta {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--accent);
    color: #061008;
    border: 0;
    padding: 12px 20px;
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 160ms;
    box-shadow: 0 0 0 0 var(--accent-glow);
  }
  .cta:hover { box-shadow: 0 0 0 4px var(--accent-soft); transform: translateY(-1px); }
  .cta:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }
  .back {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent;
    color: var(--fg-2);
    border: 1px solid var(--border-strong);
    padding: 12px 16px;
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 14px;
    cursor: pointer;
  }
  .back:hover { color: var(--fg); border-color: var(--accent-deep); }

  /* Tweaks panel surface (uses panel from starter) — adjust to dark */
  .tweaks-panel { font-family: var(--sans) !important; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="steps.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "step": 1,
  "accent": "terminal",
  "vault": "s3"
}/*EDITMODE-END*/;

const ACCENTS = {
  terminal: { name: "Terminal green", h: 145, c: 0.18, l: 0.82 },
  mint:     { name: "Mint",           h: 165, c: 0.14, l: 0.84 },
  electric: { name: "Electric lime",  h: 125, c: 0.22, l: 0.86 },
};

const STEP_LABELS = ['Key', 'Vault', '2FA', 'Done'];

function App() {
  const t = useTweaks(TWEAK_DEFAULTS);

  // Apply accent via CSS vars
  React.useEffect(() => {
    const a = ACCENTS[t.accent] || ACCENTS.terminal;
    const root = document.documentElement;
    root.style.setProperty('--accent',      `oklch(${a.l} ${a.c} ${a.h})`);
    root.style.setProperty('--accent-deep', `oklch(${a.l - 0.20} ${a.c} ${a.h})`);
    root.style.setProperty('--accent-soft', `oklch(${a.l} ${a.c} ${a.h} / 0.14)`);
    root.style.setProperty('--accent-glow', `oklch(${a.l} ${a.c} ${a.h} / 0.35)`);
  }, [t.accent]);

  const initialPhrase = React.useMemo(() => genPhrase(), []);
  const [s, setS] = React.useState({
    mode: 'gen',
    phrase: initialPhrase,
    lastGen: initialPhrase,
    lastOwn: '',
    reveal: false,

    vault: t.vault,
    localPath: '~/Library/Vault/vault.bin',
    s3:  { endpoint: 's3.us-west-002.backblazeb2.com', region: 'us-west-002', bucket: 'my-vault', prefix: '/', key: 'K00abc1234567890abcdEF', secret: '' },
    dav: { url: 'https://cloud.example.com/remote.php/dav/files/me/', user: 'me', pass: '', path: '/Apps/passwords/vault.bin' },

    totp: randomBase32(32),
    otp: '',
    backup: genBackupCodes(),
  });

  // Sync tweak -> state for vault choice
  React.useEffect(() => { setS(p => ({ ...p, vault: t.vault })); }, [t.vault]);

  const set = (patch) => setS(p => ({ ...p, ...patch }));

  const step = Math.max(1, Math.min(4, t.step | 0));
  const goto = (n) => t.setTweak('step', Math.max(1, Math.min(4, n)));

  // Validation per step → enables/disables Next
  const canNext = (() => {
    if (step === 1) return entropy(s.phrase) >= 50;
    if (step === 2) {
      if (s.vault === 'local')  return !!s.localPath;
      if (s.vault === 's3')     return s.s3.endpoint && s.s3.bucket && s.s3.key && s.s3.secret;
      if (s.vault === 'webdav') return s.dav.url && s.dav.user && s.dav.pass;
      return false;
    }
    if (step === 3) return s.otp.length === 6;
    return true;
  })();

  // Sync vault back into tweaks so the panel stays in sync
  React.useEffect(() => { if (s.vault !== t.vault) t.setTweak('vault', s.vault); /* eslint-disable-next-line */ }, [s.vault]);

  return (
    <div className="app">
      <header className="topbar">
        <div className="brand">
          <span className="brand-mark"></span>
          <span>vault<span className="dim">/self-host</span></span>
        </div>
        <div className="progress">
          {[1,2,3,4].map((n) => (
            <React.Fragment key={n}>
              <button
                className={`node ${step === n ? 'active' : ''} ${step > n ? 'done' : ''}`}
                onClick={() => goto(n)}
              >
                <span className="dot"></span>
                <span>{String(n).padStart(2, '0')} · {STEP_LABELS[n-1]}</span>
              </button>
              {n < 4 && <span className={`line ${step > n ? 'done' : ''}`}></span>}
            </React.Fragment>
          ))}
        </div>
      </header>

      <main className="card" data-screen-label={`0${step} ${STEP_LABELS[step-1]}`}>
        {step === 1 && <Step1MasterKey state={s} set={set} />}
        {step === 2 && <Step2Vault     state={s} set={set} />}
        {step === 3 && <Step3TwoFA     state={s} set={set} />}
        {step === 4 && <Step4Done      state={s} set={set} />}
      </main>

      <footer className="footer">
        <div className="footer-left">
          $ vault init &mdash; step {step}/4
        </div>
        <div className="cta-row">
          {step > 1 && step < 4 && (
            <button className="back" onClick={() => goto(step - 1)}>
              <Icon.Back /> Back
            </button>
          )}
          {step < 4 && (
            <button className="cta" disabled={!canNext} onClick={() => goto(step + 1)}>
              {step === 1 && 'Save key'}
              {step === 2 && 'Connect vault'}
              {step === 3 && 'Verify and finish'}
              <Icon.Arrow />
            </button>
          )}
        </div>
      </footer>

      <TweaksPanel tweaks={t}>
        <TweakSection title="Flow">
          <TweakRadio tweaks={t} k="step" label="Step" options={[
            { label: '1', value: 1 },
            { label: '2', value: 2 },
            { label: '3', value: 3 },
            { label: '4', value: 4 },
          ]} />
          <TweakSelect tweaks={t} k="vault" label="Vault provider" options={[
            { label: 'Local file', value: 'local' },
            { label: 'S3-compatible', value: 's3' },
            { label: 'WebDAV', value: 'webdav' },
          ]} />
        </TweakSection>
        <TweakSection title="Accent">
          <TweakRadio tweaks={t} k="accent" label="Color" options={[
            { label: 'Terminal', value: 'terminal' },
            { label: 'Mint',     value: 'mint' },
            { label: 'Lime',     value: 'electric' },
          ]} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
